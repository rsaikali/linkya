[settings]
# Line length increased to allow longer imports on single line
line_length = 150

# Multi-line output mode (3 = Vertical Hanging Indent)
multi_line_output = 3
include_trailing_comma = True
use_parentheses = True
ensure_newline_before_comments = True

# Prevent wrapping single-line imports into multi-line
# Only wrap if the import exceeds line_length
force_grid_wrap = 0
split_on_trailing_comma = False

# Don't force alphabetical sorting (keeps original order)
force_alphabetical_sort = False
force_sort_within_sections = False

# Import sections order
sections = FUTURE,STDLIB,THIRDPARTY,FIRSTPARTY,LOCALFOLDER
default_section = THIRDPARTY

# Known first-party modules (adjust based on your services)
known_first_party = 
    src,
    api,
    db,
    utils,
    websockets,
    tasks,
    database,
    config,
    morphology,
    seq2point_nilm

# Known third-party modules
known_third_party = 
    fastapi,
    uvicorn,
    celery,
    sqlalchemy,
    psycopg,
    psycopg2,
    pydantic,
    redis,
    numpy,
    pandas,
    sklearn,
    scipy,
    tensorflow,
    keras,
    pymysql,
    cryptography,
    flower,
    pytest

# Directories to skip
skip_glob = 
    **/__pycache__/*,
    **/venv/*,
    **/.venv/*,
    **/env/*,
    **/ENV/*,
    **/build/*,
    **/dist/*,
    **/*.egg-info/*,
    **/.pytest_cache/*,
    **/node_modules/*,
    frontend-service/**/*

# Files to skip
skip = 
    __pycache__,
    .git,
    .venv,
    venv,
    ENV,
    env,
    build,
    dist

# Force imports to be sorted within sections
force_sort_within_sections = False

# Force single line imports
force_single_line = False

# Treat comments as code
treat_comments_as_code = []

# Add imports to the top of files
force_adds = False

# Remove redundant aliases
remove_redundant_aliases = True

# Ensure proper spacing
lines_after_imports = 2
lines_between_types = 0

# Case sensitivity
case_sensitive = False

# Virtual environment handling
virtual_env = .venv

# Formatting for import statements
force_alphabetical_sort_within_sections = False
