name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install flake8 isort
      - name: flake8
        run: flake8 backend-service/src nilm-service/src ha-ingest-service/src ha-publish-service/src
      - name: isort
        run: isort --check-only backend-service/src nilm-service/src ha-ingest-service/src ha-publish-service/src

  build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend
        run: docker build -f backend-service/Dockerfile --target prod -t linkya-backend .
      - name: Build ha-ingest
        run: docker build -t linkya-ha-ingest ./ha-ingest-service
      - name: Build ha-publish
        run: docker build -t linkya-ha-publish ./ha-publish-service
