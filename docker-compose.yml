services:
  # Base de données locale TimescaleDB
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: nilmia-timescaledb
    environment:
      POSTGRES_DB: linkya_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: Europe/Paris
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nilmia-network

  # Redis pour Celery
  redis:
    image: redis:7-alpine
    container_name: nilmia-redis
    environment:
      TZ: Europe/Paris
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - nilmia-network

  # Service de synchronisation - Worker Celery
  sync-worker:
    build:
      context: ./sync-service
      dockerfile: Dockerfile
    container_name: nilmia-sync-worker
    command: celery -A src.tasks.celery_app worker --loglevel=info
    environment:
      TZ: Europe/Paris
    env_file:
      - .env
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./sync-service/src:/app/src
    networks:
      - nilmia-network
    restart: unless-stopped

  # Celery Beat - Planificateur de tâches
  sync-beat:
    build:
      context: ./sync-service
      dockerfile: Dockerfile
    container_name: nilmia-sync-beat
    command: celery -A src.tasks.celery_app beat --loglevel=info
    environment:
      TZ: Europe/Paris
    env_file:
      - .env
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./sync-service/src:/app/src
    networks:
      - nilmia-network
    restart: unless-stopped

  # Initialisation de la base au démarrage
  init-db:
    build:
      context: ./sync-service
      dockerfile: Dockerfile
    container_name: nilmia-init-db
    command: python -c "from src.database import db_manager; db_manager.init_local_db(); print('Databases initialized')"
    environment:
      TZ: Europe/Paris
    env_file:
      - .env
    depends_on:
      timescaledb:
        condition: service_healthy
    networks:
      - nilmia-network
    restart: "no"

  # Service NILM-CNN - Worker Celery
  cnn-worker:
    build:
      context: ./nilm-cnn-service
      dockerfile: Dockerfile
    container_name: nilmia-cnn-worker
    command: celery -A src.tasks.celery_app worker --loglevel=info --pool=solo -Q nilm_cnn
    runtime: nvidia
    environment:
      TZ: Europe/Paris
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      C_FORCE_ROOT: "true"  # Désactive le warning Celery root (container Docker isolé)
      NILM_MODEL_TYPE: "gru"  # Type de modèle: 'gru' (défaut) ou 'lstm'
    env_file:
      - .env
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      sync-worker:
        condition: service_started
    volumes:
      - ./nilm-cnn-service/src:/app/src
      - ./models:/app/models
      - nilm_uv_cache:/root/.cache/uv
    networks:
      - nilmia-network
    restart: unless-stopped

  # Celery Beat pour NILM-CNN
  cnn-beat:
    build:
      context: ./nilm-cnn-service
      dockerfile: Dockerfile
    container_name: nilmia-cnn-beat
    command: celery -A src.tasks.celery_app beat --loglevel=info
    environment:
      TZ: Europe/Paris
      C_FORCE_ROOT: "true"  # Désactive le warning Celery root (container Docker isolé)
      CUDA_VISIBLE_DEVICES: ""  # Pas de GPU pour beat (planificateur uniquement)
    env_file:
      - .env
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./nilm-cnn-service/src:/app/src
      - ./models:/app/models
    networks:
      - nilmia-network
    restart: unless-stopped

  # Initialisation de la base NILM-CNN au démarrage
  init-cnn-db:
    build:
      context: ./nilm-cnn-service
      dockerfile: Dockerfile
    container_name: nilmia-init-cnn-db
    command: python -c "from src.database import db_manager; db_manager.init_tables(); print('CNN NILM database initialized')"
    environment:
      TZ: Europe/Paris
    env_file:
      - .env
    depends_on:
      timescaledb:
        condition: service_healthy
      init-db:
        condition: service_completed_successfully
    networks:
      - nilmia-network
    restart: "no"

  # Backend API FastAPI
  backend:
    build:
      context: ./backend-service
      dockerfile: Dockerfile
    container_name: nilmia-backend
    environment:
      TZ: Europe/Paris
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      timescaledb:
        condition: service_healthy
      sync-worker:
        condition: service_started
    volumes:
      - ./backend-service/src:/app/src
      - ./models:/app/models
    networks:
      - nilmia-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 3

  # Frontend React (dev server with hot reload)
  frontend:
    build:
      context: ./frontend-service
      dockerfile: Dockerfile
    container_name: nilmia-frontend
    command: npm start
    environment:
      TZ: Europe/Paris
      REACT_APP_API_URL: ${REACT_APP_API_URL}
      REACT_APP_WS_URL: ${REACT_APP_WS_URL}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend-service/src:/app/src
      - ./frontend-service/public:/app/public
      - ./frontend-service/package.json:/app/package.json
      - /app/node_modules
    networks:
      - nilmia-network
    restart: unless-stopped
    stdin_open: true
    tty: true

  # pgweb - Interface web PostgreSQL/TimescaleDB
  pgweb:
    image: sosedoff/pgweb:latest
    container_name: nilmia-pgweb
    environment:
      PGWEB_DATABASE_URL: postgres://${LOCAL_DB_USER}:${LOCAL_DB_PASSWORD}@${LOCAL_DB_HOST}:${LOCAL_DB_PORT}/${LOCAL_DB_NAME}?sslmode=disable
      TZ: Europe/Paris
    ports:
      - "8081:8081"
    networks:
      - nilmia-network
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped

volumes:
  timescaledb_data:
  redis_data:
  nilm_uv_cache:

networks:
  nilmia-network:
    driver: bridge
    enable_ipv6: false
    driver_opts:
      com.docker.network.enable_ipv6: "false"
