services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${LOCAL_DB_NAME}
      POSTGRES_USER: ${LOCAL_DB_USER}
      POSTGRES_PASSWORD: ${LOCAL_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file: [.env]
    networks: [linkya]
    healthcheck:
      test: [CMD-SHELL, "pg_isready -U ${LOCAL_DB_USER} -d ${LOCAL_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend-service/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nilm:
        condition: service_started
    ports:
      # LAN-only bind, behind a reverse proxy (NPM/proxyman). Never 0.0.0.0.
      - "${BACKEND_BIND:-192.168.1.111}:${BACKEND_PORT:-8090}:8000"
    env_file: [.env]
    networks: [linkya]
    healthcheck:
      test: [CMD-SHELL, "curl -f http://localhost:8000/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  nilm:
    build: ./nilm-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - models:/app/models
    env_file: [.env]
    networks: [linkya]

  ha-ingest:
    build: ./ha-ingest-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: [.env]
    networks: [linkya]

  ha-publish:
    build: ./ha-publish-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nilm:
        condition: service_started
    volumes:
      # HA data dir mounted read-write for SQLite states injection.
      # Set HA_SQLITE_PATH=/ha_db/home-assistant_v2.db in .env to enable.
      - /home/rsaikali/homeassistant:/ha_db:rw
    env_file: [.env]
    networks: [linkya]

volumes:
  postgres_data:
  models:

networks:
  linkya:
    driver: bridge
