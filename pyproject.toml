[tool.isort]
# Profile compatible with Black
profile = "black"

# Line length increased to allow longer imports on single line
line_length = 150

# Sections order
sections = ["FUTURE", "STDLIB", "THIRDPARTY", "FIRSTPARTY", "LOCALFOLDER"]

# Known first party packages
known_first_party = ["src"]

# Multi-line output mode (3 = Vertical Hanging Indent)
multi_line_output = 3

# Include trailing comma
include_trailing_comma = true

# Force grid wrap
force_grid_wrap = 0

# Use parentheses for line continuation
use_parentheses = true

# Ensure newline before comments
ensure_newline_before_comments = true

# Skip these directories
skip_glob = [
    "**/.venv/*",
    "**/venv/*",
    "**/build/*",
    "**/dist/*",
    "**/__pycache__/*",
    "**/node_modules/*",
    "frontend-service/*"
]

# Don't skip __init__.py files
skip = []

# Force single line imports
force_single_line = false

# Force alphabetical sorting within sections
force_sort_within_sections = false

[tool.black]
# Line length increased to allow longer imports on single line
line-length = 150
target-version = ['py312']
