# ============================================
# Mosquitto MQTT Broker - Standalone Deployment
# ============================================
# Deployment configuration for Mosquitto on Raspberry Pi (ARM 32-bit)
# This service runs independently from the main Linkya stack

services:
  mosquitto:
    container_name: mosquitto
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8883:8883"    # MQTT over TLS (secure)
      - "9002:9002"    # MQTT over WebSockets with TLS (secure)
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_certs:/mosquitto/certs
      - mosquitto_logs:/mosquitto/log
    networks:
      - mosquitto-network
    healthcheck:
      test:
        - CMD-SHELL
        - nc -z localhost 1883 || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  mosquitto_data:
    driver: local
  mosquitto_certs:
    driver: local
  mosquitto_logs:
    driver: local

networks:
  mosquitto-network:
    driver: bridge
