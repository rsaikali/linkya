# ============================================
# Mosquitto MQTT Broker Configuration
# ============================================
# Configuration for MQTT broker with TLS and authentication support
# Used by Linkya for IoT data ingestion from Linky meters

# ============================================
# GENERAL CONFIGURATION
# ============================================

# Unique broker ID
clientid_prefixes linkya-broker-

# Allow anonymous connections (set to false for production)
allow_anonymous false

# Maximum number of concurrent client connections
max_connections 1000

# ============================================
# NETWORK LISTENERS
# ============================================

# Standard MQTT listener (non-encrypted)
listener 1883
protocol mqtt

# MQTT over WebSockets listener (non-encrypted)
listener 9001
protocol websockets

# MQTT over TLS/SSL listener (encrypted)
listener 8883
protocol mqtt

# MQTT over WebSockets with TLS listener (encrypted)
listener 9002
protocol websockets

# ============================================
# TLS/SSL CONFIGURATION
# ============================================

# Certificate Authority certificate
cafile /mosquitto/certs/ca.crt

# Server certificate and private key
certfile /mosquitto/certs/server.crt
keyfile /mosquitto/certs/server.key

# Require client certificates for mutual TLS (optional)
# require_certificate false
# use_identity_as_username false

# TLS version configuration
tls_version tlsv1.2

# Cipher suites (leave default for security)
# ciphers ECDHE+AESGCM:ECDHE+CHACHA20:DHE+AESGCM:DHE+CHACHA20:!aNULL:!MD5:!DSS

# ============================================
# AUTHENTICATION CONFIGURATION
# ============================================

# Password file for username/password authentication
password_file /mosquitto/config/passwd

# ACL file for topic-based access control
acl_file /mosquitto/config/acl.conf

# ============================================
# LOGGING CONFIGURATION
# ============================================

# Log destination (stdout for Docker)
log_dest stdout

# Log types to enable
log_type error
log_type warning
log_type notice
log_type information
log_type debug

# Connection logging
connection_messages true

# Timestamp format
log_timestamp true
log_timestamp_format %Y-%m-%d %H:%M:%S

# ============================================
# PERSISTENCE CONFIGURATION
# ============================================

# Enable message persistence
persistence true

# Persistence location
persistence_location /mosquitto/data/

# Persistence file name
persistence_file mosquitto.db

# Auto-save interval (seconds)
autosave_interval 300

# Retain messages across restarts
retained_persistence true

# ============================================
# MESSAGE CONFIGURATION
# ============================================

# Maximum message size (bytes) - 1MB for Linky frames
message_size_limit 1048576

# Maximum QoS level
max_qos 2

# Maximum number of queued messages per client
max_queued_messages 1000

# Maximum inflight messages per client
max_inflight_messages 20

# ============================================
# TOPIC CONFIGURATION
# ============================================

# Maximum topic alias count per client
max_topic_alias 10

# Topic alias maximum per client
topic_alias_maximum 10

# ============================================
# WEBSOCKET CONFIGURATION
# ============================================

# HTTP directory for WebSocket (optional)
# http_dir /mosquitto/www

# ============================================
# MONITORING CONFIGURATION
# ============================================

# System information topic prefix
sys_interval 10

# Enable $SYS topics (broker statistics)
# $SYS/broker/version
# $SYS/broker/uptime
# $SYS/broker/clients/connected
# $SYS/broker/clients/total
# $SYS/broker/messages/received
# $SYS/broker/messages/sent