# ============================================
# Mosquitto Access Control List (ACL)
# ============================================
# Topic-based access control for MQTT clients
# Format: [user <username>|pattern <pattern>|topic <topic>] [read|write|readwrite] <topic>

# ============================================
# ADMIN USER PERMISSIONS
# ============================================

# Admin user has full access to all topics
user admin
topic readwrite #

# Admin can access system topics
user admin
topic read $SYS/#

# ============================================
# LINKYA CLIENT PERMISSIONS (PRM-based)
# ============================================

# Generic pattern for any PRM as username  
# Pattern syntax: pattern [write|read|readwrite] topic/%u/subtopic
pattern write linky/%u/data
pattern write linky/%u/status
pattern read linky/%u/commands

# ============================================
# BACKEND SERVICE PERMISSIONS
# ============================================

# Backend service for data ingestion
user linkya-backend
topic read linky/+/data
topic read linky/+/status
topic write backend/commands/+
topic read backend/responses/+

# ============================================
# MONITORING SERVICE PERMISSIONS
# ============================================

# Monitoring service (read-only access to all Linky data)
user linkya-monitor
topic read linky/+/data
topic read linky/+/status
topic read $SYS/broker/+

# ============================================
# GUEST PERMISSIONS
# ============================================

# Guest users (minimal read access)
user guest
topic read linky/public/+

# ============================================
# DEFAULT DENY
# ============================================

# All other users are denied by default (mosquitto behavior)
# No explicit deny rules needed - implicit deny for unlisted permissions